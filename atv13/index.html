<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock - Sistema Escolar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sistema Maidel's School - Mock de Dados</h1>
            <p>Visualização dos dados mogados</p>
        </header>

        <main>
            <section class="section">
                <h2>1. Usuários da Escola (3)</h2>
                <div class="users-grid" id="usersContainer"></div>
            </section>

            <section class="section">
                <h2>2. Avisos (4)</h2>
                <div class="alerts-grid" id="alertsContainer"></div>
            </section>

            <section class="section">
                <h2>3. Tarefas (3)</h2>
                <div class="tasks-grid" id="tasksContainer"></div>
            </section>

            <section class="section">
                <h2>4. Reservas de Sala (2)</h2>
                <div class="reservations-grid" id="reservationsContainer"></div>
            </section>
        </main>
    </div>

    <footer>
        <p>Dados mockados carregados • <span id="log-info"></span></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
